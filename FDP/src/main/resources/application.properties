# Default profile (uncomment below to use H2 in-memory instead of PostgreSQL)
# spring.profiles.active=dev

# PostgreSQL (production)
spring.datasource.url=jdbc:postgresql://localhost:5432/finance_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1Praveen@}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Configuration
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-days=7

# Server
server.port=8080

# Springdoc / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
